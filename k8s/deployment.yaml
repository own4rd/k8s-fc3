apiVersion: apps/v1
kind: Deployment
metadata:
  name: "goserver"
  labels:
    app: "goserver"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "goserver"
  template:
    metadata:
      labels:
        app: "goserver"
    spec:
      containers:
        - name: "goserver"
          image: "deevi/hello-go:v6.0"

          resources:
            requests:
              cpu: "0.05"
              memory: "20Mi"
            limits:
              cpu: "0.05"
              memory: "20Mi"

          resources:
            requests: # Mínimo -> Reservando para o POD
              cpu: 100m
              memory: 20Mi
            limits:
              cpu: 500m
              memory: 25Mi

          startupProbe: # Startup -> Apenas na inicialização -> Liveness e readiness só conta depois
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 3
            failureThreshold: 30 # Durante 90s (1m e 30s) 

          readinessProbe: # Readness Sample -> Só enviar tráfego se tiver pronta
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 3
            failureThreshold: 1 # Deu erro 1x não tá pronta ainda
            initialDelaySeconds: 10

          livenessProbe: # Liveness Sample
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 3 # Quando dá problema, quantas vezes, ele reinicia
            timeoutSeconds: 1 # Tempo para completar a requisição e estar OK
            successThreshold: 1 # Quantas vezes testar e dá tudo ok para ele dizer que ta OK
            initialDelaySeconds: 15

          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: "goserver-env"
            - secretRef:
                name: "goserver-secret"
          volumeMounts:
            - mountPath: "/go/myfamily"
              name: "config"

      volumes:
        - name: "config"
          configMap:
            name: "configmap-family"
            items:
              - key: "members"
                path: "family.txt"