apiVersion: apps/v1
kind: Deployment
metadata:
  name: "goserver"
  labels:
    app: "goserver"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: "goserver"
  template:
    metadata:
      labels:
        app: "goserver"
    spec:
      containers:
        - name: "goserver"
          image: "deevi/hello-go:v5.2"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: "goserver-env"
            - secretRef:
                name: "goserver-secret"
          volumeMounts:
            - mountPath: "/go/myfamily"
              name: "config"

      volumes:
        - name: "config"
          configMap:
            name: "configmap-family"
            items:
              - key: "members"
                path: "family.txt"