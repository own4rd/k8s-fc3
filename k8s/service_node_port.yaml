apiVersion: v1
kind: Service
metadata:
  name: goserver-service
spec:
  selector: 
    app: goserver # Quais pods o serviço deve selecionar -> No matchLabels do Deployment
  type: NodePort # Tipo do serviço, pode ser NodePort, LoadBalancer ou ClusterIP
  ports:
    - name: goserver-service
      port: 80
      targetPort: 8080
      protocol: TCP
      nodePort: 30001